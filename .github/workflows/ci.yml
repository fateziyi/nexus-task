name: CI/CD Pipeline

# ===================================================
# 触发条件
# ===================================================
on:
  push:
    branches:
      - main       # 生产分支：触发 CI + 部署预览
      - develop    # 开发分支：触发 CI
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]
  workflow_dispatch:  # 支持手动触发

# 同一分支同时只运行一个 workflow，新推送自动取消旧的
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ===================================================
# 环境变量（全局）
# ===================================================
env:
  NODE_VERSION: '20.x'

# ===================================================
# Jobs
# ===================================================
jobs:
  # --------------------------------------------------
  # Job 1: 代码质量检查（Lint）
  # --------------------------------------------------
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run ESLint
        run: yarn lint

  # --------------------------------------------------
  # Job 2: TypeScript 类型检查
  # --------------------------------------------------
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run TypeScript compiler check
        run: yarn tsc --noEmit

  # --------------------------------------------------
  # Job 3: 构建验证
  # 依赖 lint 和 typecheck 通过后才执行
  # --------------------------------------------------
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      # 构建时注入所有必要的环境变量
      - name: Build Next.js application
        run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Clerk
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
          # Database
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Pusher
          PUSHER_APP_ID: ${{ secrets.PUSHER_APP_ID }}
          NEXT_PUBLIC_PUSHER_APP_KEY: ${{ secrets.NEXT_PUBLIC_PUSHER_APP_KEY }}
          PUSHER_APP_SECRET: ${{ secrets.PUSHER_APP_SECRET }}
          NEXT_PUBLIC_PUSHER_CLUSTER: ${{ secrets.NEXT_PUBLIC_PUSHER_CLUSTER }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/
            public/
          retention-days: 7  # 产物保留 7 天

  # --------------------------------------------------
  # Job 4: 部署到 Vercel（仅 main 分支 push 触发）
  # 依赖 build job 成功
  # --------------------------------------------------
  deploy:
    name: Deploy to Vercel (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    # 仅在 main 分支的直接 push（非 PR）时部署生产
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # 使用 GitHub Environments 进行部署保护
    environment:
      name: production
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'   # 部署到生产环境

      - name: Comment deployment URL on commit
        if: success()
        run: |
          echo "✅ Deployed to production: ${{ steps.deploy.outputs.preview-url }}"

  # --------------------------------------------------
  # Job 5: PR 预览部署（仅 PR 触发）
  # --------------------------------------------------
  deploy-preview:
    name: Deploy Preview (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.event_name == 'pull_request'

    environment:
      name: preview
      url: ${{ steps.deploy-preview.outputs.preview-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Preview to Vercel
        id: deploy-preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # 不加 --prod，部署为预览环境

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const previewUrl = '${{ steps.deploy-preview.outputs.preview-url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n| 状态 | 链接 |\n|------|------|\n| ✅ 已部署 | [${previewUrl}](${previewUrl}) |\n\n> Commit: \`${{ github.sha }}\``
            });
